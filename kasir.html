<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kasir Online - Simple POS</title>
    <style>
        :root {
            --primary: #6f42c1;
            --light: #f8f9fa;
            --dark: #343a40;
            --success: #28a745;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: var(--primary); }

        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }

        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--primary); color: white; width: 100%; padding: 15px; }
        .btn-checkout { background: var(--success); color: white; width: 100%; padding: 18px; margin-top: 15px; }

        table { width: 100%; margin-top: 20px; }

        .total-box { background: #e9ecef; padding: 20px; text-align: center; border-radius: 10px; }

        #nota-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #nota-area, #nota-area * { visibility: visible; }
            #nota-area { position: absolute; left: 0; top: 0; width: 100%; display: block; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🛒 Kasir Digital</h2>
        <input type="text" id="itemName" placeholder="Nama Barang">
        <input type="number" id="itemPrice" placeholder="Harga">
        <input type="number" id="itemQty" value="1">
        <button class="btn-add" onclick="tambahBarang()">Tambah</button>

        <table>
            <tbody id="cartBody"></tbody>
        </table>
    </div>

    <div class="card">
        <div class="total-box">
            <div id="displayTotal">Rp 0</div>
        </div>

        <input type="number" id="cashIn" oninput="hitungKembalian()" placeholder="Uang">
        <div id="displayKembalian">Rp 0</div>

        <button class="btn-checkout" onclick="prosesSelesai()">Cetak</button>
    </div>
</div>

<div id="nota-area">
    <div style="width: 80mm; margin: auto; font-family: monospace;">
        <h3>SHALL STORE</h3>
        <div id="notaItems"></div>
        <div id="notaTotal"></div>
        <div id="notaBayar"></div>
        <div id="notaKembali"></div>
    </div>
</div>

<script>
let keranjang = [];
let grandTotal = 0;

function formatRupiah(angka) {
    return "Rp " + new Intl.NumberFormat('id-ID').format(angka) + ".000";
}
}

// ✅ FORMAT TAMBAH .000
function formatRibuanKeFull(angka) {
    return "Rp " + (angka * 1000).toLocaleString('id-ID');
}

function tambahBarang() {
    const nama = itemName.value;
    const harga = parseInt(itemPrice.value);
    const qty = parseInt(itemQty.value);

    const total = harga * qty;
    keranjang.push({ nama, harga, qty, total });

    updateTabel();
}

function updateTabel() {
    cartBody.innerHTML = "";
    grandTotal = 0;

    keranjang.forEach(item => {
        grandTotal += item.total;
        cartBody.innerHTML += `<tr>
            <td>${item.nama}</td>
            <td>${formatRupiah(item.total)}</td>
        </tr>`;
    });

    displayTotal.innerText = formatRupiah(grandTotal);
}

function hitungKembalian() {
    const cash = parseInt(cashIn.value) || 0;
    displayKembalian.innerText = formatRupiah(cash - grandTotal);
}

function prosesSelesai() {
    let list = "";

    keranjang.forEach(item => {
        // ✅ NOTA PAKE .000
        list += `<div>${item.nama} - ${formatRibuanKeFull(item.total)}</div>`;
    });

    notaItems.innerHTML = list;

    // ✅ SEMUA NOTA FORMAT .000
    notaTotal.innerText = "TOTAL: " + formatRibuanKeFull(grandTotal);
    notaBayar.innerText = "BAYAR: " + formatRibuanKeFull(parseInt(cashIn.value));
    notaKembali.innerText = "KEMBALI: " + formatRibuanKeFull(parseInt(cashIn.value) - grandTotal);

    window.print();
}
</script>

</body>
</html>
