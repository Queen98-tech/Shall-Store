<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shall Admin | Manajemen Koleksi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; }
        
        body { 
            background: linear-gradient(rgba(255, 248, 240, 0.9), rgba(255, 248, 240, 0.9)), 
                        url('https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #333;
            padding: 40px 20px;
        }

        .admin-container { max-width: 900px; margin: 0 auto; }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(139, 126, 116, 0.15);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h2 { margin-bottom: 25px; font-size: 20px; color: #2c2c2c; letter-spacing: 2px; text-transform: uppercase; text-align: center; font-weight: 300; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        input, textarea {
            width: 100%; padding: 14px; border: 1px solid rgba(0,0,0,0.05);
            border-radius: 12px; outline: none; font-size: 14px; background: #fff; transition: 0.3s;
        }

        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 8px; color: #8b7e74; text-transform: uppercase; letter-spacing: 1px; }

        textarea { grid-column: span 2; height: 100px; resize: none; }
        input:focus, textarea:focus { border-color: #8b7e74; box-shadow: 0 0 0 4px rgba(139, 126, 116, 0.1); }

        .variant-upload-container { grid-column: span 2; margin-top: 10px; }
        .variant-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        
        .variant-box { 
            border: 2px dashed #e2e2e2; border-radius: 15px; height: 110px; 
            cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; 
            background: #fff; overflow: hidden; transition: 0.3s;
        }
        .variant-box:hover { border-color: #8b7e74; transform: scale(1.02); }
        .variant-box span { font-size: 8px; color: #aaa; text-align: center; font-weight: bold; padding: 5px; }
        .variant-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .variant-box input { display: none; }
        
        .btn-save {
            background: #2c2c2c; color: white; padding: 18px; border: none; border-radius: 50px;
            cursor: pointer; font-weight: 700; width: 100%; text-transform: uppercase; letter-spacing: 3px;
            transition: 0.3s; font-size: 12px; margin-top: 25px;
        }
        .btn-save:hover { background: #555; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; font-size: 10px; text-transform: uppercase; color: #8b7e74; border-bottom: 1px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #fafafa; font-size: 14px; }

        .img-mini { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }

        .action-btns { display: flex; gap: 10px; }
        .btn-edit { background: #fdf6e3; color: #b08d3e; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-del { background: #fff5f5; color: #d66d6d; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-cancel { background: none; color: #aaa; padding: 10px; border: none; cursor: pointer; width: 100%; margin-top: 10px; font-size: 11px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="card">
        <h2 id="form-title">Tambah Koleksi Baru</h2>
        <input type="hidden" id="edit-id">
        
        <div class="form-grid">
            <div>
                <label>Nama Produk</label>
                <input type="text" id="p-nama" placeholder="Contoh: Silk Sabrina Dress">
            </div>
            <div>
                <label>Harga (Rp)</label>
                <input type="text" id="p-harga" placeholder="Contoh: 150.000" oninput="formatHarga(this)">
            </div>
            
            <textarea id="p-desc" placeholder="Tuliskan deskripsi singkat koleksi ini..."></textarea>

            <div class="variant-upload-container">
                <label>Foto Produk (Maks 5 Foto)</label>
                <div class="variant-grid">
                    <script>
                        for(let i=0; i<5; i++) {
                            document.write(`
                                <div class="variant-box" onclick="document.getElementById('file-${i}').click()">
                                    <img id="preview-${i}" style="display:none">
                                    <span id="text-${i}">${i===0 ? 'FOTO UTAMA' : 'VARIAN '+(i+1)}</span>
                                    <input type="file" id="file-${i}" accept="image/*" onchange="handleFileSelect(this, ${i})">
                                </div>
                            `);
                        }
                    </script>
                </div>
            </div>
        </div>
        
        <button class="btn-save" id="btn-save" onclick="simpan()">Simpan Koleksi</button>
        <button class="btn-cancel" id="btn-cancel" style="display:none" onclick="resetForm()">Batalkan Perubahan</button>
    </div>

    <div class="card">
        <h2>Koleksi Tersimpan</h2>
        <table>
            <thead>
                <tr>
                    <th>Preview</th>
                    <th>Nama Koleksi</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-barang"></tbody>
        </table>
    </div>
</div>

<script>
    let variantImages = ["", "", "", "", ""];

    // Fungsi format rupiah otomatis
    function formatHarga(input) {
        let val = input.value.replace(/[^0-9]/g, "");
        if (val) {
            val = parseInt(val).toLocaleString('id-ID');
            input.value = val;
        }
    }

    function handleFileSelect(input, index) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                variantImages[index] = e.target.result;
                const img = document.getElementById('preview-' + index);
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('text-' + index).style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    function loadData() {
        const tbody = document.getElementById('tabel-barang');
        const data = JSON.parse(localStorage.getItem('shall_variants')) || [];
        
        tbody.innerHTML = data.length ? "" : "<tr><td colspan='4' style='text-align:center; color:#ccc; padding:30px;'>Gudang masih kosong.</td></tr>";
        
        data.forEach((p, index) => {
            const mainImg = p.variants[0] || 'https://via.placeholder.com/60';
            tbody.innerHTML += `
                <tr>
                    <td><img src="${mainImg}" class="img-mini"></td>
                    <td><b>${p.nama}</b></td>
                    <td>Rp ${p.harga}</td>
                    <td class="action-btns">
                        <button class="btn-edit" onclick="isiForm(${index})">Ubah</button>
                        <button class="btn-del" onclick="hapus(${index})">Hapus</button>
                    </td>
                </tr>
            `;
        });
    }

    function simpan() {
        const id = document.getElementById('edit-id').value;
        const filtered = variantImages.filter(img => img !== "");

        const produk = {
            nama: document.getElementById('p-nama').value,
            harga: document.getElementById('p-harga').value,
            desc: document.getElementById('p-desc').value,
            variants: filtered
        };

        if(!produk.nama || filtered.length === 0) return alert("Lengkapi nama dan minimal satu foto!");

        let data = JSON.parse(localStorage.getItem('shall_variants')) || [];

        if(id === "") data.push(produk);
        else data[id] = produk;

        localStorage.setItem('shall_variants', JSON.stringify(data));
        resetForm();
        loadData();
        alert("Koleksi Shall Store diperbarui!");
    }

    function isiForm(index) {
        const data = JSON.parse(localStorage.getItem('shall_variants'))[index];
        document.getElementById('edit-id').value = index;
        document.getElementById('p-nama').value = data.nama;
        document.getElementById('p-harga').value = data.harga;
        document.getElementById('p-desc').value = data.desc;

        resetVariantBoxes();
        data.variants.forEach((img, i) => {
            if(i < 5) {
                variantImages[i] = img;
                const preview = document.getElementById('preview-' + i);
                preview.src = img;
                preview.style.display = 'block';
                document.getElementById('text-' + i).style.display = 'none';
            }
        });

        document.getElementById('form-title').innerText = "Edit: " + data.nama;
        document.getElementById('btn-save').innerText = "Update Koleksi";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function hapus(index) {
        if(confirm("Yakin ingin menghapus koleksi ini?")) {
            let data = JSON.parse(localStorage.getItem('shall_variants'));
            data.splice(index, 1);
            localStorage.setItem('shall_variants', JSON.stringify(data));
            loadData();
        }
    }

    function resetVariantBoxes() {
        for(let i=0; i<5; i++) {
            document.getElementById('preview-' + i).style.display = 'none';
            document.getElementById('text-' + i).style.display = 'block';
            document.getElementById('file-' + i).value = "";
        }
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('p-nama').value = "";
        document.getElementById('p-harga').value = "";
        document.getElementById('p-desc').value = "";
        resetVariantBoxes();
        variantImages = ["", "", "", "", ""];
        document.getElementById('form-title').innerText = "Tambah Koleksi Baru";
        document.getElementById('btn-save').innerText = "Simpan Koleksi";
        document.getElementById('btn-cancel').style.display = "none";
    }

    window.onload = loadData;
</script>
</body>
</html>
