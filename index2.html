<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shall Store | Luxury Collection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; }
        body { 
            background: linear-gradient(rgba(255, 248, 240, 0.8), rgba(255, 248, 240, 0.8)), 
                        url('https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #4a4a4a;
            min-height: 100vh;
        }
        header { padding: 60px 20px; text-align: center; }
        header h1 { font-size: 42px; font-weight: 300; letter-spacing: 12px; color: #2c2c2c; text-transform: uppercase; margin-bottom: 10px; }
        header p { font-size: 14px; letter-spacing: 3px; color: #8b7e74; text-transform: uppercase; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px 80px; }
        .koleksi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        .product-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .product-card:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(139, 126, 116, 0.2); background: rgba(255, 255, 255, 0.7); }
        .img-container { width: 100%; height: 380px; overflow: hidden; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .product-card:hover .product-img { transform: scale(1.1); }
        .product-info { padding: 25px; text-align: center; }
        .product-name { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #333; }
        .product-price { color: #8b7e74; font-weight: 500; font-size: 15px; margin-bottom: 20px; display: block; }
        .btn-wa { display: inline-block; background: #2c2c2c; color: #fff; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-size: 12px; font-weight: 700; letter-spacing: 1px; transition: 0.3s; }
        .btn-wa:hover { background: #555; letter-spacing: 2px; }
        .empty-msg { grid-column: 1/-1; text-align: center; padding: 100px; background: rgba(255,255,255,0.3); border-radius: 20px; border: 1px dashed #8b7e74; }
    </style>
</head>
<body>
<header>
    <h1>SHALL STORE</h1>
    <p>Minimalist Hijab & Shirt</p>
</header>
<div class="container">
    <div id="koleksi-list" class="koleksi-grid"></div>
</div>
<script>
    function loadProducts() {
        const grid = document.getElementById('koleksi-list');
        const data = JSON.parse(localStorage.getItem('shall_variants')) || [];
        if (data.length === 0) {
            grid.innerHTML = `<div class="empty-msg"><p style="color: #8b7e74;">Koleksi sedang dipersiapkan. <br> Silakan upload melalui dashboard.html</p></div>`;
            return;
        }
        grid.innerHTML = "";
        data.forEach((p) => {
            const mainImg = p.variants[0] || 'https://via.placeholder.com/400x500?text=Shall+Store';
            
            // BAGIAN YANG DIUBAH: Menggunakan encodeURIComponent agar link WA tidak patah
            const pesan = encodeURIComponent(`Halo Shall Store, saya tertarik dengan ${p.nama}`);
            
            grid.innerHTML += `
                <div class="product-card">
                    <div class="img-container">
                        <img src="${mainImg}" class="product-img" alt="${p.nama}">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${p.nama}</h3>
                        <span class="product-price">Rp ${p.harga}</span>
                        <a href="https://wa.me/6285337131412?text=${pesan}" target="_blank" class="btn-wa">BELI SEKARANG</a>
                    </div>
                </div>
            `;
        });
    }
    window.onload = loadProducts;
</script>
</body>
</html>
